openapi: 3.1.0
info:
  title: PlayDota2Win Download API - Per-Item Statistics
  version: 1.1.0
  description: |
    API contract changes for per-item download count tracking feature.

    **Changes in this version:**
    - Add `downloadCount` field to `DownloadItem` schema
    - Update `GET /api/admin` response to include per-item counts
    - Update `POST /api/downloads/link` to increment per-item counts
    - Update `GET /api/downloads` to calculate total from item counts

servers:
  - url: https://playdota2.win
    description: Production
  - url: http://localhost:8788
    description: Local development (Wrangler)

paths:
  /api/admin:
    get:
      summary: Get all download items (admin)
      description: |
        Fetch all download items with their individual download counts.
        Requires admin authentication via JWT.

        **Change**: Response now includes `downloadCount` for each item.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved download list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDownloadList'
              example:
                success: true
                data:
                  items:
                    - id: 'uuid-1234'
                      platform: 'windows'
                      title: 'Dota 2 优化工具'
                      version: '1.2.3'
                      size: '5.2 MB'
                      storageType: 'r2'
                      url: '/api/admin/download/windows/1.2.3/tool.exe'
                      enabled: true
                      downloadCount: 42
                      createdAt: 1706140800000
                      updatedAt: 1706140800000
                  downloadCount: 57
                  lastUpdated: 1706140800000
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/downloads:
    get:
      summary: Get enabled download items (public)
      description: |
        Fetch all enabled download items for public display.

        **Change**: `downloadCount` now represents sum of all item counts.
      responses:
        '200':
          description: Successfully retrieved download list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDownloadList'
              example:
                success: true
                data:
                  items:
                    - id: 'uuid-1234'
                      platform: 'windows'
                      title: 'Dota 2 优化工具'
                      version: '1.2.3'
                      size: '5.2 MB'
                      storageType: 'link'
                      url: 'https://example.com/tool.exe'
                      enabled: true
                      downloadCount: 42
                      createdAt: 1706140800000
                      updatedAt: 1706140800000
                  downloadCount: 57
                  lastUpdated: 1706140800000
        '500':
          $ref: '#/components/responses/ServerError'

  /api/downloads/link:
    post:
      summary: Generate download link
      description: |
        Authenticate user and generate a download link for a specific item.

        **Change**: Increments both `item.downloadCount` and `list.downloadCount`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - itemId
                - password
              properties:
                itemId:
                  type: string
                  format: uuid
                  description: ID of the download item
                password:
                  type: string
                  description: Download password
                turnstileToken:
                  type: string
                  description: Cloudflare Turnstile token (required after failed attempts)
            example:
              itemId: 'uuid-1234'
              password: 'download123'
      responses:
        '200':
          description: Download link generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        description: Download URL (direct link or relay URL)
                      filename:
                        type: string
                        description: Suggested filename for download
                      count:
                        type: integer
                        description: Updated total download count (for public display)
              example:
                success: true
                data:
                  url: '/api/downloads/relay/windows/1.2.3/tool.exe?token=abc123'
                  filename: 'dota2-tool.exe'
                  count: 58
        '400':
          description: Invalid request or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                error: '密码错误，还有 2 次机会'
        '401':
          description: Unauthorized (password failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Download item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                error: '下载项不存在'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DownloadItem:
      type: object
      required:
        - id
        - platform
        - version
        - size
        - storageType
        - url
        - createdAt
        - updatedAt
        - enabled
      properties:
        id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [windows, macos, linux]
        categoryId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        configGuide:
          type: string
          nullable: true
        filename:
          type: string
          nullable: true
        version:
          type: string
          example: '1.2.3'
        size:
          type: string
          example: '5.2 MB'
        storageType:
          type: string
          enum: [link, r2, s3]
        url:
          type: string
          description: Storage URL or path
        signedUrl:
          type: string
          nullable: true
          description: Temporary signed URL (admin only, R2 items)
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp (milliseconds)
        updatedAt:
          type: integer
          format: int64
        enabled:
          type: boolean
        downloadCount:
          type: integer
          minimum: 0
          description: |
            Number of times this item's download link was generated.
            NEW in v1.1.0: Per-item download count tracking.
            Optional for backward compatibility (missing = 0).
          example: 42

    DownloadList:
      type: object
      required:
        - items
        - downloadCount
        - lastUpdated
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DownloadItem'
        downloadCount:
          type: integer
          minimum: 0
          description: |
            Total download count across all items.
            CHANGED in v1.1.0: Now represents sum of all item.downloadCount values.
          example: 57
        lastUpdated:
          type: integer
          format: int64
          description: Unix timestamp (milliseconds)

    ApiResponseDownloadList:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/DownloadList'
        error:
          type: string
          nullable: true

    ApiErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string

  responses:
    Unauthorized:
      description: Unauthorized (missing or invalid JWT)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error: 'Unauthorized'

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            error: 'Failed to fetch downloads'

tags:
  - name: admin
    description: Admin-only endpoints (require JWT)
  - name: public
    description: Public endpoints (no authentication)
  - name: downloads
    description: Download link generation
